<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비즈니스 메일 변환기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a237e;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header .icon { font-size: 24px; }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* API 키 입력 바 */
    .api-bar {
      background: #e8eaf6;
      border-bottom: 1px solid #c5cae9;
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .api-bar label {
      font-size: 13px;
      font-weight: 600;
      color: #3949ab;
      white-space: nowrap;
    }

    .api-bar input {
      flex: 1;
      min-width: 200px;
      max-width: 420px;
      padding: 7px 12px;
      border: 1px solid #9fa8da;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      font-family: monospace;
      color: #333;
      background: white;
    }

    .api-bar input:focus { border-color: #3949ab; }

    .api-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 10px;
      font-weight: 500;
    }

    .api-status.ok { background: #e8f5e9; color: #2e7d32; }
    .api-status.empty { background: #fff3e0; color: #e65100; }

    .container {
      display: flex;
      flex: 1;
      gap: 20px;
      padding: 24px;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
    }

    .panel {
      flex: 1;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .panel-left .panel-header .dot { background: #ff9800; }
    .panel-right .panel-header .dot { background: #4caf50; }

    .panel-header span {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .panel-header .badge {
      margin-left: auto;
      font-size: 11px;
      background: #e8eaf6;
      color: #3949ab;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      padding: 20px;
      font-size: 14px;
      line-height: 1.7;
      resize: none;
      color: #333;
      font-family: inherit;
      background: transparent;
    }

    textarea::placeholder { color: #aaa; }

    .action-bar {
      padding: 14px 20px;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .char-count { font-size: 12px; color: #aaa; }

    .btn-convert {
      background: #1a237e;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }

    .btn-convert:hover { background: #283593; }
    .btn-convert:active { transform: scale(0.97); }
    .btn-convert:disabled { background: #9fa8da; cursor: not-allowed; }

    .output-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.8;
      color: #333;
    }

    .placeholder-msg {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      gap: 10px;
      text-align: center;
    }

    .placeholder-msg .big-icon { font-size: 40px; }
    .placeholder-msg p { font-size: 14px; }

    .email-block {
      display: none;
      flex-direction: column;
    }

    .email-block.visible { display: flex; }

    .email-field {
      display: flex;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }

    .email-label {
      font-size: 12px;
      color: #999;
      font-weight: 600;
      min-width: 40px;
      padding-top: 2px;
    }

    .email-value { font-size: 14px; color: #555; }

    .email-subject-value {
      font-size: 15px;
      color: #222;
      font-weight: 600;
    }

    .email-body {
      padding: 16px 0;
      font-size: 14px;
      line-height: 1.9;
      color: #333;
      white-space: pre-wrap;
    }

    .output-actions {
      padding: 14px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }

    .btn-copy, .btn-reset {
      flex: 1;
      padding: 9px 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      border: none;
    }

    .btn-copy { background: #e8eaf6; color: #1a237e; }
    .btn-copy:hover { background: #c5cae9; }
    .btn-reset { background: #fce4ec; color: #c62828; }
    .btn-reset:hover { background: #f8bbd0; }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #666;
      padding: 60px 20px;
      font-size: 14px;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fce4ec;
      border: 1px solid #f48fb1;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: #c62828;
      line-height: 1.6;
    }

    .error-msg.visible { display: block; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; padding: 12px; }
      header { padding: 14px 16px; }
      .api-bar { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="icon">✉️</div>
  <div>
    <h1>비즈니스 메일 변환기</h1>
    <p>하고 싶은 말을 쓰면 정중한 업무 메일로 바꿔드립니다</p>
  </div>
</header>

<!-- API 키 입력 -->
<div class="api-bar">
  <label>🔑 Gemini API 키</label>
  <input
    type="password"
    id="apiKey"
    placeholder="AIza..."
    oninput="updateApiStatus()"
  />
  <span class="api-status empty" id="apiStatus">키 미입력</span>
</div>

<div class="container">

  <!-- 왼쪽: 입력 -->
  <div class="panel panel-left">
    <div class="panel-header">
      <div class="dot"></div>
      <span>하고 싶은 말 작성</span>
      <div class="badge">입력</div>
    </div>

    <textarea
      id="inputText"
      placeholder="예) 내일까지 자료 보내달라고 했는데 아직도 안 왔어요. 빨리 보내주세요."
      oninput="updateCount()"
    ></textarea>

    <div class="action-bar">
      <span class="char-count" id="charCount">0자</span>
      <button class="btn-convert" id="convertBtn" onclick="convert()">
        메일로 변환 →
      </button>
    </div>
  </div>

  <!-- 오른쪽: 출력 -->
  <div class="panel panel-right">
    <div class="panel-header">
      <div class="dot"></div>
      <span>변환된 비즈니스 메일</span>
      <div class="badge">결과</div>
    </div>

    <div class="output-area" id="outputArea">
      <div class="placeholder-msg" id="placeholder">
        <div class="big-icon">📨</div>
        <p>왼쪽에 내용을 작성하고<br><strong>메일로 변환</strong> 버튼을 눌러주세요</p>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Gemini AI가 변환 중입니다...</span>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="email-block" id="emailBlock">
        <div class="email-field">
          <span class="email-label">수신</span>
          <span class="email-value">담당자분께</span>
        </div>
        <div class="email-field">
          <span class="email-label">제목</span>
          <span class="email-subject-value" id="emailSubject"></span>
        </div>
        <div class="email-body" id="emailBody"></div>
      </div>
    </div>

    <div class="output-actions" id="outputActions" style="display:none;">
      <button class="btn-copy" onclick="copyEmail()">📋 복사하기</button>
      <button class="btn-reset" onclick="resetAll()">↩ 다시 작성</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">클립보드에 복사되었습니다!</div>

<script>
  function updateCount() {
    const text = document.getElementById('inputText').value;
    document.getElementById('charCount').textContent = text.length + '자';
  }

  function updateApiStatus() {
    const key = document.getElementById('apiKey').value.trim();
    const status = document.getElementById('apiStatus');
    if (key.length > 10) {
      status.textContent = '키 입력됨 ✓';
      status.className = 'api-status ok';
    } else {
      status.textContent = '키 미입력';
      status.className = 'api-status empty';
    }
  }

  async function convert() {
    const input = document.getElementById('inputText').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();

    if (!input) { alert('내용을 입력해주세요.'); return; }
    if (!apiKey) { alert('Gemini API 키를 입력해주세요.'); return; }

    // UI 초기화
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('emailBlock').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('loading').classList.add('visible');
    document.getElementById('outputActions').style.display = 'none';
    document.getElementById('convertBtn').disabled = true;

    try {
      const result = await callGemini(apiKey, input);
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('emailSubject').textContent = result.subject;
      document.getElementById('emailBody').textContent = result.body;
      document.getElementById('emailBlock').classList.add('visible');
      document.getElementById('outputActions').style.display = 'flex';
    } catch (err) {
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('errorMsg').textContent = '오류: ' + err.message;
      document.getElementById('errorMsg').classList.add('visible');
    } finally {
      document.getElementById('convertBtn').disabled = false;
    }
  }

  async function callGemini(apiKey, userText) {
    const prompt = `당신은 한국 직장인을 위한 비즈니스 메일 작성 전문가입니다.
아래의 내용을 정중하고 격식 있는 한국어 업무 메일로 변환해주세요.

[규칙]
- 인사말로 시작하고 마무리 인사로 끝낼 것
- 존댓말 사용, 정중하고 전문적인 톤 유지
- 반드시 아래 JSON 형식으로만 응답할 것 (다른 텍스트 없이)

[응답 형식]
{
  "subject": "메일 제목",
  "body": "메일 본문 전체"
}

[변환할 내용]
${userText}`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
        })
      }
    );

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `API 오류 (${res.status})`);
    }

    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

    // JSON 파싱
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('응답 형식을 파싱할 수 없습니다.');

    const parsed = JSON.parse(jsonMatch[0]);
    if (!parsed.subject || !parsed.body) throw new Error('응답에 제목 또는 본문이 없습니다.');

    return parsed;
  }

  function copyEmail() {
    const subject = document.getElementById('emailSubject').textContent;
    const body = document.getElementById('emailBody').textContent;
    const full = `제목: ${subject}\n\n${body}`;
    navigator.clipboard.writeText(full).then(showToast);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function resetAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('charCount').textContent = '0자';
    document.getElementById('emailBlock').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('outputActions').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비즈니스 텍스트 변환기</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta property="og:title" content="비즈니스 텍스트 변환기" />
  <meta property="og:image" content="/ogimg.png" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    @font-face {
      font-family: 'Cafe24Surround';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff') format('woff');
      font-weight: normal;
      font-display: swap;
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', Arial, sans-serif;
      background: #faf9f7;
      min-height: 100vh;
      color: #000000;
      font-weight: 400;
    }

    /* ── 헤더 ── */
    header {
      background: #faf9f7;
      border-bottom: 1px solid #dad4c8;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 500;
      color: #000000;
      letter-spacing: -0.1px;
    }

    /* ── 메인 레이아웃 ── */
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 56px 32px 80px;
    }

    .page-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.08px;
      color: #9f9b93;
      margin-bottom: 14px;
    }

    .page-title {
      font-family: 'Cafe24Surround', sans-serif;
      font-size: 44px;
      font-weight: normal;
      color: #000000;
      letter-spacing: -1.1px;
      line-height: 1.10;
      margin-bottom: 14px;
    }

    .page-desc {
      font-size: 18px;
      font-weight: 400;
      color: #9f9b93;
      line-height: 1.60;
      letter-spacing: -0.36px;
      margin-bottom: 36px;
    }

    /* ── 탭 ── */
    .type-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .tab-btn {
      padding: 8px 20px;
      border-radius: 1584px;
      border: 1px solid #dad4c8;
      background: #ffffff;
      font-size: 14px;
      font-weight: 500;
      color: #9f9b93;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      box-shadow: rgba(0,0,0,0.1) 0px 1px 1px, rgba(0,0,0,0.04) 0px -1px 1px inset, rgba(0,0,0,0.05) 0px -0.5px 1px;
    }

    .tab-btn.active {
      background: #000000;
      border-color: #000000;
      color: #ffffff;
    }

    .tab-btn:hover:not(.active) {
      border-color: #9f9b93;
      color: #000000;
    }

    /* ── 2열 레이아웃 ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── 카드 공통 ── */
    .card {
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #dad4c8;
      overflow: hidden;
      box-shadow: rgba(0,0,0,0.1) 0px 1px 1px, rgba(0,0,0,0.04) 0px -1px 1px inset, rgba(0,0,0,0.05) 0px -0.5px 1px;
    }

    .card-head {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #eee9df;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-head-title {
      font-size: 13px;
      font-weight: 600;
      color: #000000;
      letter-spacing: -0.1px;
      text-transform: uppercase;
      letter-spacing: 1.08px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 11px;
      background: #f0f8ff;
      color: #3859f9;
      border: 1px solid #c1d8f8;
    }

    /* ── 입력 영역 ── */
    textarea {
      width: 100%;
      min-height: 280px;
      border: none;
      outline: none;
      padding: 20px 24px;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.60;
      color: #000000;
      resize: vertical;
      font-family: inherit;
      background: transparent;
      letter-spacing: -0.1px;
    }

    textarea::placeholder { color: #9f9b93; }

    .input-footer {
      padding: 14px 24px;
      border-top: 1px solid #eee9df;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .char-count { font-size: 12px; color: #9f9b93; font-weight: 400; }

    /* ── 플레이풀 버튼 ── */
    .btn-convert {
      background: #000000;
      color: #ffffff;
      border: none;
      padding: 10px 22px;
      border-radius: 1584px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background 0.15s;
      letter-spacing: -0.1px;
      position: relative;
    }

    .btn-convert:hover:not(:disabled) {
      background: #078a52;
      transform: rotateZ(-4deg) translateY(-3px);
      box-shadow: rgb(0,0,0) -5px 5px;
    }

    .btn-convert:active { transform: scale(0.97); }
    .btn-convert:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 결과 영역 ── */
    .output-body {
      padding: 18px 24px;
      min-height: 280px;
    }

    .placeholder-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 64px 20px;
      color: #9f9b93;
      text-align: center;
    }

    .placeholder-msg .big-icon { font-size: 32px; opacity: 0.7; }
    .placeholder-msg p { font-size: 14px; font-weight: 400; line-height: 1.6; color: #9f9b93; }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 64px 20px;
      color: #9f9b93;
      font-size: 13px;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid #eee9df;
      border-top-color: #078a52;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fff5f6;
      border: 1px solid #ffc2c8;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 400;
      color: #fc7981;
      line-height: 1.6;
    }

    .error-msg.visible { display: block; }

    /* ── 결과 카드들 ── */
    .results-list {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .results-list.visible { display: flex; }

    .result-card {
      border: 1px solid #dad4c8;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      position: relative;
      background: #ffffff;
      box-shadow: rgba(0,0,0,0.05) 0px 1px 2px;
    }

    .result-card:hover {
      border-color: #9f9b93;
      transform: translateY(-1px);
      box-shadow: rgba(0,0,0,0.1) 0px 4px 8px;
    }

    .result-card.selected {
      border-color: #000000;
      background: #faf9f7;
      box-shadow: rgba(0,0,0,0.1) 0px 1px 1px, rgba(0,0,0,0.04) 0px -1px 1px inset;
    }

    .card-num {
      font-size: 10px;
      font-weight: 600;
      color: #9f9b93;
      margin-bottom: 6px;
      letter-spacing: 1.08px;
      text-transform: uppercase;
    }

    .result-card.selected .card-num { color: #078a52; }

    .card-subject {
      font-size: 13px;
      font-weight: 600;
      color: #000000;
      margin-bottom: 8px;
      letter-spacing: -0.1px;
    }

    .card-body {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.75;
      color: #55534e;
      white-space: pre-wrap;
    }

    .card-check {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #000000;
      color: #fff;
      font-size: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .result-card.selected .card-check { display: flex; }

    /* ── 하단 액션 ── */
    .output-footer {
      padding: 14px 24px;
      border-top: 1px solid #eee9df;
      display: none;
      gap: 8px;
    }

    .output-footer.visible { display: flex; }

    .btn-copy {
      flex: 1;
      padding: 10px 0;
      border-radius: 1584px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: #000000;
      color: #fff;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background 0.15s;
      letter-spacing: -0.1px;
    }

    .btn-copy:hover {
      background: #3bd3fd;
      color: #000000;
      transform: rotateZ(-3deg) translateY(-2px);
      box-shadow: rgb(0,0,0) -4px 4px;
    }

    .btn-reset {
      padding: 10px 20px;
      border-radius: 1584px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid #dad4c8;
      background: transparent;
      color: #9f9b93;
      transition: all 0.15s;
      letter-spacing: -0.1px;
    }

    .btn-reset:hover {
      border-color: #9f9b93;
      color: #000000;
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #02492a;
      color: #84e7a5;
      padding: 10px 22px;
      border-radius: 1584px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      box-shadow: rgb(0,0,0) -4px 4px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .columns { grid-template-columns: 1fr; }
      .page { padding: 32px 20px 60px; }
      .page-title { font-size: 32px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="/favicon.png" class="logo-img" alt="logo" />
    <span class="logo-text">비즈니스 텍스트 변환기</span>
  </div>
</header>

<div class="page">
  <p class="page-label">AI 변환기</p>
  <h1 class="page-title">메시지 변환하기</h1>
  <p class="page-desc">하고 싶은 말을 입력하면 AI가 업무 메일, 메신저 메시지, 또는 보고서로 변환해드립니다.</p>

  <div class="type-tabs">
    <button class="tab-btn active" id="tabMail" onclick="setTab('mail')">✉️ 업무 메일</button>
    <button class="tab-btn" id="tabMsg" onclick="setTab('messenger')">💬 메신저 메시지</button>
    <button class="tab-btn" id="tabReport" onclick="setTab('report')">📋 보고서</button>
  </div>

  <div class="columns">
    <!-- 입력 -->
    <div class="card">
      <div class="card-head">
        <span class="card-head-title">입력</span>
        <span class="badge">작성</span>
      </div>
      <textarea
        id="inputText"
        placeholder="예) 내일까지 자료 보내달라고 했는데 아직도 안 왔어요. 빨리 보내주세요."
        oninput="updateCount()"
      ></textarea>
      <div class="input-footer">
        <span class="char-count" id="charCount">0자</span>
        <button class="btn-convert" id="convertBtn" onclick="convert()">변환하기</button>
      </div>
    </div>

    <!-- 결과 -->
    <div class="card">
      <div class="card-head">
        <span class="card-head-title" id="resultTitle">결과</span>
        <span class="badge">AI</span>
      </div>

      <div class="output-body" id="outputBody">
        <div class="placeholder-msg" id="placeholder">
          <div class="big-icon">📨</div>
          <p>왼쪽에 내용을 입력하고<br>변환 버튼을 눌러주세요</p>
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>AI가 변환 중입니다...</span>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="results-list" id="resultsList"></div>
      </div>

      <div class="output-footer" id="outputFooter">
        <button class="btn-copy" onclick="copySelected()">📋 선택 항목 복사</button>
        <button class="btn-reset" onclick="resetAll()">↩ 다시 작성</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">클립보드에 복사되었습니다!</div>

<script>
  let selectedIndex = -1;
  let currentResults = [];
  let currentType = 'mail';

  function setTab(type) {
    currentType = type;
    document.getElementById('tabMail').classList.toggle('active', type === 'mail');
    document.getElementById('tabMsg').classList.toggle('active', type === 'messenger');
    document.getElementById('tabReport').classList.toggle('active', type === 'report');
  }

  function updateCount() {
    const text = document.getElementById('inputText').value;
    document.getElementById('charCount').textContent = text.length + '자';
  }

  async function convert() {
    const input = document.getElementById('inputText').value.trim();
    if (!input) { alert('내용을 입력해주세요.'); return; }

    const titleMap = { mail: '메일', messenger: '메신저', report: '보고서' };

    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('resultsList').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('loading').classList.add('visible');
    document.getElementById('outputFooter').classList.remove('visible');
    document.getElementById('convertBtn').disabled = true;
    document.getElementById('resultTitle').textContent = titleMap[currentType] || '결과';

    selectedIndex = -1;
    currentResults = [];

    try {
      const res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input, type: currentType }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류가 발생했습니다.');

      currentResults = data.results || [];
      renderCards(currentType);

      document.getElementById('loading').classList.remove('visible');
      document.getElementById('resultsList').classList.add('visible');
      document.getElementById('outputFooter').classList.add('visible');
    } catch (err) {
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('errorMsg').textContent = '오류: ' + err.message;
      document.getElementById('errorMsg').classList.add('visible');
    } finally {
      document.getElementById('convertBtn').disabled = false;
    }
  }

  function renderCards(type) {
    const list = document.getElementById('resultsList');
    list.innerHTML = '';
    currentResults.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'result-card' + (i === 0 ? ' selected' : '');
      card.onclick = () => selectCard(i);

      let bodyHtml = '';
      if (type === 'report' && item.bullets) {
        bodyHtml = item.bullets.map(b => `• ${b}`).join('\n');
      } else {
        bodyHtml = item.body || '';
      }

      card.innerHTML = `
        ${currentResults.length > 1 ? `<div class="card-num">버전 ${i + 1}</div>` : ''}
        ${type === 'mail' && item.subject ? `<div class="card-subject">📌 ${item.subject}</div>` : ''}
        ${type === 'report' && item.title ? `<div class="card-subject">📋 ${item.title}</div>` : ''}
        <div class="card-body">${bodyHtml}</div>
        <div class="card-check">✓</div>
      `;
      list.appendChild(card);
    });
    selectedIndex = 0;
  }

  function selectCard(index) {
    selectedIndex = index;
    document.querySelectorAll('.result-card').forEach((card, i) => {
      card.classList.toggle('selected', i === index);
    });
  }

  function copySelected() {
    if (selectedIndex < 0 || !currentResults[selectedIndex]) return;
    const item = currentResults[selectedIndex];
    let full;
    if (currentType === 'report') {
      full = item.bullets ? item.bullets.join('\n') : '';
    } else {
      full = item.subject ? `제목: ${item.subject}\n\n${item.body}` : item.body;
    }
    navigator.clipboard.writeText(full).then(showToast);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function resetAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('charCount').textContent = '0자';
    document.getElementById('resultsList').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('outputFooter').classList.remove('visible');
    document.getElementById('placeholder').style.display = 'flex';
    selectedIndex = -1;
    currentResults = [];
  }
</script>

</body>
</html>

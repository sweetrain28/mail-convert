<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비즈니스 메일&메세지 변환기</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      color: #061b31;
      font-feature-settings: "ss01";
      font-weight: 300;
    }

    /* ── 헤더 ── */
    header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #e5edf5;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-img {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 400;
      color: #061b31;
      letter-spacing: -0.2px;
    }

    /* ── 메인 레이아웃 ── */
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 52px 32px 80px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 300;
      color: #061b31;
      letter-spacing: -0.64px;
      line-height: 1.10;
      margin-bottom: 10px;
    }

    .page-desc {
      font-size: 16px;
      font-weight: 300;
      color: #64748d;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    /* ── 탭 ── */
    .type-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 7px 16px;
      border-radius: 4px;
      border: 1px solid #e5edf5;
      background: #ffffff;
      font-size: 14px;
      font-weight: 400;
      color: #64748d;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      letter-spacing: -0.1px;
    }

    .tab-btn.active {
      background: #533afd;
      border-color: #533afd;
      color: #fff;
    }

    .tab-btn:hover:not(.active) {
      border-color: #b9b9f9;
      color: #533afd;
    }

    /* ── 2열 레이아웃 ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── 카드 공통 ── */
    .card {
      background: #ffffff;
      border-radius: 6px;
      border: 1px solid #e5edf5;
      overflow: hidden;
      box-shadow: rgba(50,50,93,0.25) 0px 30px 45px -30px, rgba(0,0,0,0.1) 0px 18px 36px -18px;
    }

    .card-head {
      padding: 18px 22px 16px;
      border-bottom: 1px solid #e5edf5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-head-title {
      font-size: 13px;
      font-weight: 400;
      color: #273951;
      letter-spacing: -0.1px;
    }

    .badge {
      font-size: 10px;
      font-weight: 400;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(21,190,83,0.2);
      color: #108c3d;
      border: 1px solid rgba(21,190,83,0.4);
    }

    /* ── 입력 영역 ── */
    textarea {
      width: 100%;
      min-height: 280px;
      border: none;
      outline: none;
      padding: 20px 22px;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.65;
      color: #061b31;
      resize: vertical;
      font-family: inherit;
      background: transparent;
    }

    textarea::placeholder { color: #64748d; font-weight: 300; }

    .input-footer {
      padding: 14px 22px;
      border-top: 1px solid #e5edf5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .char-count { font-size: 12px; color: #64748d; font-weight: 300; }

    .btn-convert {
      background: #533afd;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.1px;
    }

    .btn-convert:hover:not(:disabled) { background: #4434d4; }
    .btn-convert:active { transform: scale(0.98); }
    .btn-convert:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 결과 영역 ── */
    .output-body {
      padding: 18px 22px;
      min-height: 280px;
    }

    .placeholder-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 64px 20px;
      color: #64748d;
      text-align: center;
    }

    .placeholder-msg .big-icon { font-size: 32px; opacity: 0.6; }
    .placeholder-msg p { font-size: 14px; font-weight: 300; line-height: 1.6; color: #64748d; }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 64px 20px;
      color: #64748d;
      font-size: 13px;
      font-weight: 300;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid #e5edf5;
      border-top-color: #533afd;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fff8f8;
      border: 1px solid #ffd7ef;
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 300;
      color: #ea2261;
      line-height: 1.6;
    }

    .error-msg.visible { display: block; }

    /* ── 결과 카드들 ── */
    .results-list {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .results-list.visible { display: flex; }

    .result-card {
      border: 1px solid #e5edf5;
      border-radius: 5px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
      background: #ffffff;
    }

    .result-card:hover {
      border-color: #b9b9f9;
      box-shadow: rgba(23,23,23,0.06) 0px 3px 6px;
    }

    .result-card.selected {
      border-color: #533afd;
      box-shadow: rgba(83,58,253,0.1) 0px 0px 0px 3px;
    }

    .card-num {
      font-size: 11px;
      font-weight: 400;
      color: #64748d;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .result-card.selected .card-num { color: #533afd; }

    .card-subject {
      font-size: 13px;
      font-weight: 400;
      color: #061b31;
      margin-bottom: 8px;
      letter-spacing: -0.1px;
    }

    .card-body {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.75;
      color: #273951;
      white-space: pre-wrap;
    }

    .card-check {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #533afd;
      color: #fff;
      font-size: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    .result-card.selected .card-check { display: flex; }

    /* ── 하단 액션 ── */
    .output-footer {
      padding: 14px 22px;
      border-top: 1px solid #e5edf5;
      display: none;
      gap: 8px;
    }

    .output-footer.visible { display: flex; }

    .btn-copy {
      flex: 1;
      padding: 8px 0;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: #533afd;
      color: #fff;
      transition: background 0.15s;
      letter-spacing: -0.1px;
    }

    .btn-copy:hover { background: #4434d4; }

    .btn-reset {
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid #e5edf5;
      background: transparent;
      color: #64748d;
      transition: all 0.15s;
      letter-spacing: -0.1px;
    }

    .btn-reset:hover { border-color: #b9b9f9; color: #533afd; }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #061b31;
      color: #fff;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      box-shadow: rgba(50,50,93,0.25) 0px 14px 21px -14px, rgba(0,0,0,0.1) 0px 8px 17px -8px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .columns { grid-template-columns: 1fr; }
      .page { padding: 32px 20px 60px; }
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

<header>
  <img src="/favicon.png" class="logo-img" alt="logo" />
  <span class="logo-text">비즈니스 메일&메세지 변환기</span>
</header>

<div class="page">
  <h1 class="page-title">메시지 변환하기</h1>
  <p class="page-desc">하고 싶은 말을 입력하면 AI가 정중한 업무 메일 또는 메신저 메시지로 바꿔드립니다.</p>

  <div class="type-tabs">
    <button class="tab-btn active" id="tabMail" onclick="setTab('mail')">✉️ 업무 메일</button>
    <button class="tab-btn" id="tabMsg" onclick="setTab('messenger')">💬 메신저 메시지</button>
  </div>

  <div class="columns">
    <!-- 입력 -->
    <div class="card">
      <div class="card-head">
        <span class="card-head-title">하고 싶은 말 작성</span>
        <span class="badge">입력</span>
      </div>
      <textarea
        id="inputText"
        placeholder="예) 내일까지 자료 보내달라고 했는데 아직도 안 왔어요. 빨리 보내주세요."
        oninput="updateCount()"
      ></textarea>
      <div class="input-footer">
        <span class="char-count" id="charCount">0자</span>
        <button class="btn-convert" id="convertBtn" onclick="convert()">변환하기</button>
      </div>
    </div>

    <!-- 결과 -->
    <div class="card">
      <div class="card-head">
        <span class="card-head-title" id="resultTitle">변환 결과</span>
        <span class="badge">결과</span>
      </div>

      <div class="output-body" id="outputBody">
        <div class="placeholder-msg" id="placeholder">
          <div class="big-icon">📨</div>
          <p>왼쪽에 내용을 입력하고<br>변환 버튼을 눌러주세요</p>
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>AI가 변환 중입니다...</span>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="results-list" id="resultsList"></div>
      </div>

      <div class="output-footer" id="outputFooter">
        <button class="btn-copy" onclick="copySelected()">📋 선택 항목 복사</button>
        <button class="btn-reset" onclick="resetAll()">↩ 다시 작성</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">클립보드에 복사되었습니다!</div>

<script>
  let selectedIndex = -1;
  let currentResults = [];
  let currentType = 'mail';

  function setTab(type) {
    currentType = type;
    document.getElementById('tabMail').classList.toggle('active', type === 'mail');
    document.getElementById('tabMsg').classList.toggle('active', type === 'messenger');
  }

  function updateCount() {
    const text = document.getElementById('inputText').value;
    document.getElementById('charCount').textContent = text.length + '자';
  }

  async function convert() {
    const input = document.getElementById('inputText').value.trim();
    if (!input) { alert('내용을 입력해주세요.'); return; }

    const isMessenger = currentType === 'messenger';

    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('resultsList').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('loading').classList.add('visible');
    document.getElementById('outputFooter').classList.remove('visible');
    document.getElementById('convertBtn').disabled = true;
    document.getElementById('resultTitle').textContent = isMessenger ? '변환된 메신저 메시지' : '변환된 비즈니스 메일';

    selectedIndex = -1;
    currentResults = [];

    try {
      const res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input, type: currentType }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류가 발생했습니다.');

      currentResults = data.results || [];
      renderCards(isMessenger);

      document.getElementById('loading').classList.remove('visible');
      document.getElementById('resultsList').classList.add('visible');
      document.getElementById('outputFooter').classList.add('visible');
    } catch (err) {
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('errorMsg').textContent = '오류: ' + err.message;
      document.getElementById('errorMsg').classList.add('visible');
    } finally {
      document.getElementById('convertBtn').disabled = false;
    }
  }

  function renderCards(isMessenger) {
    const list = document.getElementById('resultsList');
    list.innerHTML = '';
    currentResults.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'result-card' + (i === 0 ? ' selected' : '');
      card.onclick = () => selectCard(i);
      card.innerHTML = `
        <div class="card-num">버전 ${i + 1}</div>
        ${!isMessenger && item.subject ? `<div class="card-subject">📌 ${item.subject}</div>` : ''}
        <div class="card-body">${item.body}</div>
        <div class="card-check">✓</div>
      `;
      list.appendChild(card);
    });
    selectedIndex = 0;
  }

  function selectCard(index) {
    selectedIndex = index;
    document.querySelectorAll('.result-card').forEach((card, i) => {
      card.classList.toggle('selected', i === index);
    });
  }

  function copySelected() {
    if (selectedIndex < 0 || !currentResults[selectedIndex]) return;
    const item = currentResults[selectedIndex];
    const full = item.subject ? `제목: ${item.subject}\n\n${item.body}` : item.body;
    navigator.clipboard.writeText(full).then(showToast);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function resetAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('charCount').textContent = '0자';
    document.getElementById('resultsList').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('outputFooter').classList.remove('visible');
    document.getElementById('placeholder').style.display = 'flex';
    selectedIndex = -1;
    currentResults = [];
  }
</script>

</body>
</html>
